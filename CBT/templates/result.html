<!DOCTYPE html>
<html>

<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Your Result</h1>
<p>Name: {{ result.username }}</p>
<p>Score: {{ result.score }} / {{ result.total }}</p>
<p>Percentage: {{ result.percentage }}%</p>
<p>Submitted at: {{ result.time }}</p>
{% if result.percentage >= 50 %}
    <p style="color: green;">You Passed 🎉</p>
{% else %}
    <p style="color: red;">You Failed ❌</p>
{% endif %}
<a href="/">Try Again</a>
<footer>
    <p style="text-align:center;">CSC 202 CBT Project</p>
</footer>
</body>
</html>
