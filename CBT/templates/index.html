<!DOCTYPE html>
<html>

<head>
    <title>CBT Test</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Mini CBT Test</h1>

<form method="POST" action="/submit">

    {% for q in questions %}
        <p>{{ q.text }}</p>

        {% for option in q.options %}
            <input type="radio" name="{{ q.text }}" value="{{ option }}" required>
            {{ option }} <br>
        {% endfor %}

        <hr>
    {% endfor %}

    <button type="submit">Submit</button>

</form>
<footer>
    <p style="text-align:center;">CSC 202 CBT Project</p>
</footer>
</body>
</html>
